{{- if .Values.enableDisaggregatedSet }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "lws.fullname" . }}-disaggregatedset-viewer-role
  labels:
    {{- include "lws.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - disaggregatedset.x-k8s.io
    resources:
      - disaggregatedsets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - disaggregatedset.x-k8s.io
    resources:
      - disaggregatedsets/status
    verbs:
      - get
{{- end }}
