# Default values for lws.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

nameOverride: ""
fullnameOverride: ""
enablePrometheus: false
enableCertManager: false
# enableDisaggregatedSet installs the DisaggregatedSet editor/viewer/admin
# ClusterRoles and the validating webhook. The CRD (under crds/), the
# bundled controller, and its manager RBAC are always installed.
enableDisaggregatedSet: false
replicaCount: 1
imagePullSecrets: []
# Customize controlerManager
image:
  manager:
    repository: registry.k8s.io/lws/lws
    # tag, if defined will use the given image tag, else Chart.AppVersion will be used
    tag: main
    pullPolicy: Always
podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  # fsGroup: 2000
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
      # readOnlyRootFilesystem: true
      # runAsNonRoot: true
      # runAsUser: 1000
service:
  type: ClusterIP
  port: 9443
resources:
  requests:
    cpu: 1
    memory: 1Gi
    # We usually recommend not to specify default resources and to leave this as a conscious
    # choice for the user. This also increases chances charts run on environments with little
    # resources, such as Minikube. If you do want to specify resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi
nodeSelector: {}
tolerations: []
affinity: {}
# gangSchedulingManagement is configuration for gang scheduling management.
# For example:
# gangSchedulingManagement:
#   schedulerProvider: volcano
gangSchedulingManagement: {}

# crdUpgrade is configuration for the CRD upgrade Job that runs as a pre-install/pre-upgrade
# Helm hook. It applies CRDs via kubectl before the controller starts, ensuring CRDs are
# always up-to-date regardless of whether they live in the crds/ directory or templates/.
crdUpgrade:
  enabled: true
  # Time-to-live (TTL) for crd-upgrade jobs after completion. Default is 259200 seconds (3 days).
  ttlSecondsAfterFinished: 259200
  # CRD Upgrader image configuration
  image:
    repository: registry.k8s.io/lws/lws-upgrade-crd
    tag: ""  # defaults to .Chart.AppVersion
    pullPolicy: IfNotPresent
  # Tolerations for CRD Upgrader Job pod
  tolerations:
    - operator: Exists
  # Node selector for CRD Upgrader Job pod
  nodeSelector: {}
