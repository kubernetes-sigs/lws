apiVersion: disaggregatedset.x-k8s.io/v1
kind: DisaggregatedSet
metadata:
  name: disaggregatedset-3role-sample
  namespace: default
spec:
  roles:
    - name: prefill
      metadata:
        labels:
          app: prefill
          component: disaggregation
      spec:
        replicas: 4
        rolloutStrategy:
          rollingUpdateConfiguration:
            maxSurge: 1
            maxUnavailable: 0
        leaderWorkerTemplate:
          size: 2
          workerTemplate:
            metadata:
              labels:
                app: prefill
                component: disaggregation
            spec:
              containers:
                - name: model
                  image: registry.k8s.io/pause:3.9
                  resources:
                    limits:
                      cpu: 100m
                      memory: 64Mi
                    requests:
                      cpu: 100m
                      memory: 64Mi
    - name: decode
      metadata:
        labels:
          app: decode
          component: disaggregation
      spec:
        replicas: 2
        rolloutStrategy:
          rollingUpdateConfiguration:
            maxSurge: 1
            maxUnavailable: 0
        leaderWorkerTemplate:
          size: 1
          workerTemplate:
            metadata:
              labels:
                app: decode
                component: disaggregation
            spec:
              containers:
                - name: model
                  image: registry.k8s.io/pause:3.9
                  resources:
                    limits:
                      cpu: 100m
                      memory: 64Mi
                    requests:
                      cpu: 100m
                      memory: 64Mi
    - name: encode
      metadata:
        labels:
          app: encode
          component: disaggregation
      spec:
        replicas: 2
        rolloutStrategy:
          rollingUpdateConfiguration:
            maxSurge: 1
            maxUnavailable: 0
        leaderWorkerTemplate:
          size: 1
          workerTemplate:
            metadata:
              labels:
                app: encode
                component: disaggregation
            spec:
              containers:
                - name: model
                  image: registry.k8s.io/pause:3.9
                  resources:
                    limits:
                      cpu: 100m
                      memory: 64Mi
                    requests:
                      cpu: 100m
                      memory: 64Mi
