# This rule is not used by the project disaggregatedset itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to disaggregatedset.x-k8s.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: disaggregatedset
    app.kubernetes.io/managed-by: kustomize
  name: disaggregatedset-viewer-role
rules:
- apiGroups:
  - disaggregatedset.x-k8s.io
  resources:
  - disaggregatedsets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - disaggregatedset.x-k8s.io
  resources:
  - disaggregatedsets/status
  verbs:
  - get
