apiVersion: disaggregatedset.x-k8s.io/v1alpha1
kind: DisaggregatedSet
metadata:
  labels:
    app.kubernetes.io/name: disaggregatedset
    app.kubernetes.io/managed-by: kustomize
  name: disaggdeployment-nginx-example
spec:
  # Prefill configuration with 10 nginx replicas
  prefill:
    replicas: 10
    rolloutStrategy:
       maxSurge: 2
       maxUnavailable: 0
    leaderWorkerTemplate:
      size: 2
      workerTemplate:
        metadata:
          labels:
            app: prefill-nginx
            component: disaggregation
          annotations: 
            kueue.x-k8s.io/podset-required-topology: "cloud.provider.com/topology-block"
            kueue.x-k8s.io/podset-group-name: "vllm-multi-host"
        spec:
          containers:
          - name: nginx
            image: nginx:1.29.3
            ports:
            - containerPort: 80
            resources:
              limits:
                cpu: "100m"
                memory: "64Mi"
              requests:
                cpu: "100m"
                memory: "64Mi"
            readinessProbe:
              httpGet:
                path: /
                port: 80
              initialDelaySeconds: 15
              periodSeconds: 2

  # Decode configuration with 2 nginx replicas
  decode:
    replicas: 2
    rolloutStrategy:
       maxSurge: 2
       maxUnavailable: 1
    leaderWorkerTemplate:
      size: 1
      workerTemplate:
        metadata:
          labels:
            app: decode-nginx
            component: disaggregation
        spec:
          containers:
          - name: nginx
            image: nginx:1.29.3
            ports:
            - containerPort: 80
            resources:
              limits:
                cpu: "100m"
                memory: "64Mi"
              requests:
                cpu: "100m"
                memory: "64Mi"
            readinessProbe:
              httpGet:
                path: /
                port: 80
              initialDelaySeconds: 5
              periodSeconds: 2
