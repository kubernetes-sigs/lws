apiVersion: disaggregatedset.x-k8s.io/v1alpha1
kind: DisaggregatedSet
metadata:
  labels:
    app.kubernetes.io/name: disaggregatedset
    app.kubernetes.io/managed-by: kustomize
  name: disaggdeployment-with-service
spec:
  # Prefill configuration with ServiceTemplate
  prefill:
    replicas: 2
    leaderWorkerTemplate:
      size: 1
      workerTemplate:
        metadata:
          labels:
            app: prefill-nginx
        spec:
          containers:
          - name: nginx
            image: nginx:1.29.0
            ports:
            - containerPort: 80
            readinessProbe:
              httpGet:
                path: /
                port: 80
              initialDelaySeconds: 5
              periodSeconds: 2
    # ServiceTemplate creates a versioned Service when both sides are ready
    serviceTemplate:
      labels:
        app.kubernetes.io/component: prefill
      spec:
        type: ClusterIP
        ports:
        - port: 80
          targetPort: 80
          protocol: TCP

  # Decode configuration with ServiceTemplate
  decode:
    replicas: 2
    leaderWorkerTemplate:
      size: 1
      workerTemplate:
        metadata:
          labels:
            app: decode-nginx
        spec:
          containers:
          - name: nginx
            image: nginx:1.29.0
            ports:
            - containerPort: 80
            readinessProbe:
              httpGet:
                path: /
                port: 80
              initialDelaySeconds: 5
              periodSeconds: 2
    # ServiceTemplate creates a versioned Service when both sides are ready
    serviceTemplate:
      labels:
        app.kubernetes.io/component: decode
      spec:
        type: ClusterIP
        ports:
        - port: 80
          targetPort: 80
          protocol: TCP
